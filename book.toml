[book]
title = "Agentic Software Engineering: A Practical Guide for the AI-Native Engineer"

description = "The best engineers of the next decade won't be the fastest coders — they'll be the clearest thinkers. This 12-week handbook reimagines software engineering for the agentic era: from requirements and design to testing, security, and CI/CD — then through agentic workflows, responsible AI, and the human skills that compound when implementation is automated. Built for everyone who want to stay ahead, not just keep up."
authors = ["Kla Tantithamthavorn"]
language = "en"

[output.html]
default-theme = "light"
preferred-dark-theme = "navy"
site-url = "/"
additional-js = ["theme/mermaid.min.js", "theme/mermaid-init.js"]
additional-css = ["theme/css/custom.css"]

[output.html.search]
enable = true
limit-results = 20
use-boolean-and = true

[preprocessor.mermaid]
command = "mdbook-mermaid"
after = ["links"]
